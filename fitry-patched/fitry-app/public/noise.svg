<svg xmlns="http://www.w3.org/2000/svg" width="200" height="200" viewBox="0 0 200 200">
  <defs>
    <filter id="noise">
      <feTurbulence type="fractalNoise" baseFrequency="0.9" numOctaves="4" result="noise" seed="1"/>
      <feDisplacementMap in="SourceGraphic" in2="noise" scale="1" />
    </filter>
  </defs>
  <rect width="200" height="200" fill="#ffffff" opacity="0.02" filter="url(#noise)"/>
  <rect width="200" height="200" fill="url(#noiseFill)"/>
  <defs>
    <pattern id="noiseFill" x="0" y="0" width="200" height="200" patternUnits="userSpaceOnUse">
      <rect width="200" height="200" fill="none"/>
      <circle cx="10" cy="20" r="0.5" fill="#000000" opacity="0.1"/>
      <circle cx="50" cy="60" r="0.5" fill="#000000" opacity="0.08"/>
      <circle cx="80" cy="30" r="0.5" fill="#000000" opacity="0.12"/>
      <circle cx="120" cy="100" r="0.5" fill="#000000" opacity="0.09"/>
      <circle cx="160" cy="150" r="0.5" fill="#000000" opacity="0.11"/>
      <circle cx="30" cy="140" r="0.5" fill="#000000" opacity="0.07"/>
      <circle cx="170" cy="50" r="0.5" fill="#000000" opacity="0.1"/>
      <circle cx="70" cy="180" r="0.5" fill="#000000" opacity="0.08"/>
      <circle cx="150" cy="20" r="0.5" fill="#000000" opacity="0.09"/>
      <circle cx="40" cy="170" r="0.5" fill="#000000" opacity="0.1"/>
    </pattern>
  </defs>
</svg>
